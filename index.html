<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Keuangan PRABU</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #047857; font-family: 'Segoe UI', sans-serif; }

    .splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 1rem;
      transition: opacity .5s;
    }
    .splash-logo { font-size: 4rem; }
    .splash-title {
      color: #fff; font-size: 1.8rem;
      font-weight: 800; letter-spacing: 2px;
    }
    .splash-sub { color: #d1fae5; font-size: .95rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-top: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      display: none; width: 100%;
      height: 100vh; border: none;
    }
  </style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-logo">💰</div>
  <div class="splash-title">LAPORAN KEUANGAN PRABU</div>
  <div class="splash-sub">Memuat aplikasi...</div>
  <div class="spinner"></div>
</div>
<iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycby7WbGxoAn9CmV7tFW6T6Vad6ZEbiNdrPcu3sIqKT5qb1WDUn0_FxQwgcZgJ7oXu8Zs/exec"
  allowfullscreen
  onload="frameLoaded()">
</iframe>

<script>
  function frameLoaded() {
    document.getElementById("splash").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("appFrame").style.display = "block";
    }, 500);
  }
</script>

</body>
</html>
